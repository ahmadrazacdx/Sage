# git-cliff configuration
# Generates changelogs from conventional commits
# Commit format: <type>(<scope>): <description>
# Types used in this project: feat, fix, docs, test, refactor, chore, build
# Scopes: agents, rag, tools, ui, config, llm, docs

[changelog]
header = """
# Changelog\n
All notable changes to Sage are documented here.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
  {% if commit.breaking %} [**BREAKING**]{% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features"       },
  { message = "^fix",      group = "Bug Fixes"      },
  { message = "^refactor", group = "Refactoring"    },
  { message = "^test",     group = "Testing"        },
  { message = "^docs",     group = "Documentation"  },
  { message = "^build",    group = "Build System"   },
  { message = "^chore",    skip = true              },
]

filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
