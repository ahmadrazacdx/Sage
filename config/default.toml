# Sage — Default System Configuration

[app]
name      = "Sage"
data_dir  = "artifacts/data"
log_level = "info"

[llm]
model_path_cpu  = "artifacts/models/Qwen3.5-2B-Q4_K_M.gguf"
model_path_cuda = "artifacts/models/Qwen3.5-4B-Q4_K_M.gguf"
model_name_cpu  = "Qwen3.5-2B"
model_name_cuda = "Qwen3.5-4B"
llama_cpp_cpu_bin    = "artifacts/servers/cpu/llama-server.exe"
llama_cpp_cuda_bin   = "artifacts/servers/cuda/llama-server.exe"
llama_cpp_vulkan_bin = "artifacts/servers/vulkan/llama-server.exe"

# Hardware auto-scaling
gpu_layers      = "auto"
context_window  = "auto"
startup_timeout = 180.0
port            = 8080

# KV-cache quantization strategy
cache_type_k = "q4_0"
cache_type_v = "q4_0"

# Generation parameters
temperature      = 0.3
max_tokens       = 4096
thinking_mode    = true
reasoning_budget = 512

[embedding]
embed_model = "artifacts/models/embedding-models/bge-small-en-v1.5"

[rag]
curriculum_collection   = "curriculum"
user_uploads_collection = "user_uploads"
vectordb_dir            = "artifacts/data/databases/vectordb"

# BM25 index paths
bm25_curriculum_file    = "artifacts/data/databases/vectordb/bm25_curriculum.pkl"
bm25_user_uploads_file  = "artifacts/data/databases/vectordb/bm25_user_uploads.pkl"

# Chunking
chunk_size       = 512
chunk_overlap    = 80
min_chunk_tokens = 100

# Hybrid retrieval
top_k                    = 5
retrieval_multiplier     = 2
rrf_k_constant           = 60
max_retrieval_iterations = 3

[preprocessing]
max_file_size_mb   = 200
min_chars_per_page = 50
ocr_dpi            = 300
ocr_engine         = "tesseract"
ocr_language       = "eng"
llm_window_tokens  = 1500
llm_window_overlap = 200
llm_concurrency    = 5
llm_retry_attempts = 3
workers            = 0

[database]
path     = "artifacts/data/databases/sage.db"
wal_mode = true

[agent]
max_input_tokens    = 2000
max_history_tokens  = 600
max_conversations   = 100
llm_timeout         = 180
diagram_max_retries = 3
research_max_iters  = 2

[tools.sandbox]
timeout         = 10
max_code_length = 8000
sessions_dir    = "artifacts/sandbox/data/sessions"
figures_dir     = "artifacts/sandbox/data/figures"

[tools.mermaid]
mmdr_bin_path  = "artifacts/mmdr/mmdr.exe"
render_timeout = 15.0

[tools.search]
arxiv_timeout = 30
web_timeout   = 30
wiki_timeout  = 30
max_results   = 5

[tools.export]
typst_bin  = "artifacts/typst/typst.exe"
output_dir = "artifacts/data/exports"

[corpus]
max_user_documents  = 100
allowed_extensions  = [".pdf", ".docx", ".pptx", ".md", ".txt"]

[network]
force_offline  = false
check_interval = 5
timeout        = 5.0

[ui]
host               = "localhost"
port               = 8765
browser_auto_open  = true

