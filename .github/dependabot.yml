version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      langchain:
        patterns: ["langchain*", "langgraph*"]
      security:
        patterns: ["pydantic*", "chromadb*", "aiosqlite*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly