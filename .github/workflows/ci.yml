name: CI

on:
  push:
    branches: [main, dev, "dev/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Mypy
        run: uv run mypy src/

  # test:
  #   needs: lint
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       os: [ubuntu-latest, windows-latest]
  #       python-version: ["3.11", "3.12"]
  #   runs-on: ${{ matrix.os }}
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: astral-sh/setup-uv@v7
  #     - run: uv python install ${{ matrix.python-version }}
  #     - run: uv sync --all-extras
  #     - name: Run tests
  #       run: uv run pytest --cov --cov-report=xml --cov-report=term-missing
  #     - name: Upload coverage
  #       if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: coverage-report
  #         path: coverage.xml

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - name: Build wheel
        run: uv build
      - name: Verify wheel installs
        run: |
          uv venv /tmp/test-install
          uv pip install dist/*.whl --python /tmp/test-install/bin/python
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify import layering
        run: |
          # tools/ must never import from agents/ or rag/
          if grep -rn "from sage\.agents\|from sage\.rag" src/sage/tools/; then
            echo "::error::tools/ layer imports from agents/ or rag/ — violates architecture"
            exit 1
          fi
          # rag/ must never import from agents/
          if grep -rn "from sage\.agents" src/sage/rag/; then
            echo "::error::rag/ layer imports from agents/ — violates architecture"
            exit 1
          fi
          echo "Import layering OK"