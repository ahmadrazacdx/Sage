name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev-main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy pyproject.toml to pages folder
        run: cp pyproject.toml frontend/artifacts_page/
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend/artifacts_page'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
