name: Security

on:
  push:
    branches: [main, dev, "dev/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 6 AM UTC

permissions:
  security-events: write
  contents: read

jobs:
  # Runs on every push to dev/main AND PRs AND weekly.
  # Catches accidentally committed secrets as early as possible.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    # Runs only on PRs to main AND the weekly schedule.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Audit dependencies
        run: |
          uv export --no-dev -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt --strict --desc

  codeql:
    # Runs only on PRs to main AND the weekly schedule.
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - run: uv sync --all-extras
      - uses: github/codeql-action/analyze@v3